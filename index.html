<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>团队日程管理</title>
<!-- 预连接关键域名（提前建立 TLS，省 0.3-0.5s） -->

<link rel="preconnect" href="https://unpkg.com" crossorigin>
<link rel="preconnect" href="https://mbdkqwtvxaijiwppgpxa.supabase.co" crossorigin>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--primary:#007AFF;--primary-light:#E8F2FF;--primary-dark:#0056CC;
--bg:#FFF;--bg2:#F5F5F7;--bg3:#E8E8ED;--surface:#FFF;
--border:#D1D1D6;--border-light:#E5E5EA;
--text1:#1D1D1F;--text2:#6E6E73;--text3:#AEAEB2;--text-inv:#FFF;
--success:#34C759;--success-bg:#E8F9ED;
--warning:#FF9500;--warning-bg:#FFF5E6;
--error:#FF3B30;--error-bg:#FFE9E7;
--shadow-sm:0 1px 2px rgba(0,0,0,.04);
--shadow-md:0 4px 12px rgba(0,0,0,.08);
--shadow-lg:0 8px 24px rgba(0,0,0,.12);
--shadow-xl:0 16px 48px rgba(0,0,0,.16);
--r-sm:4px;--r-md:8px;--r-lg:12px;--r-xl:16px;--r-full:9999px;
--font:-apple-system,BlinkMacSystemFont,'SF Pro Display','SF Pro Text','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif;
--nav-h:64px;--tab-h:56px;
}
html,body{height:100%;font-family:var(--font);color:var(--text1);background:var(--bg2);font-size:15px;line-height:1.4;-webkit-font-smoothing:antialiased}
a{color:var(--primary);text-decoration:none}
button{font-family:var(--font);cursor:pointer;border:none;outline:none;font-size:15px}
input,textarea,select{font-family:var(--font);outline:none;font-size:15px}
.btn{display:inline-flex;align-items:center;justify-content:center;height:40px;padding:0 20px;border-radius:var(--r-md);font-weight:500;transition:all .15s}
.btn:active{transform:scale(.98)}
.btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:var(--primary-dark)}
.btn-secondary{background:var(--bg3);color:var(--text1)}.btn-secondary:hover{background:var(--border)}
.btn-danger{background:var(--error);color:#fff}.btn-danger:hover{background:#E0342B}
.btn-ghost{background:transparent;color:var(--primary)}.btn-ghost:hover{background:var(--primary-light)}
.btn-outline{background:transparent;color:var(--primary);border:1.5px solid var(--primary)}.btn-outline:hover{background:var(--primary-light)}
.btn-sm{height:32px;padding:0 14px;font-size:13px}
.btn-lg{height:48px;padding:0 28px;font-size:16px}
.btn:disabled{opacity:.4;pointer-events:none}
.btn-block{width:100%}
.input-group{margin-bottom:16px}
.input-group label{display:block;font-size:13px;font-weight:500;color:var(--text2);margin-bottom:6px}
.input-group input,.input-group textarea,.input-group select{width:100%;height:42px;padding:0 14px;border:1.5px solid var(--border);border-radius:var(--r-md);background:var(--bg);color:var(--text1);transition:border .15s}
.input-group textarea{height:auto;min-height:80px;padding:10px 14px;resize:vertical}
.input-group input:focus,.input-group textarea:focus,.input-group select:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(0,122,255,.1)}
.input-group.error input,.input-group.error textarea{border-color:var(--error);background:var(--error-bg)}
.input-group .error-msg{font-size:12px;color:var(--error);margin-top:4px}
.input-group input::placeholder,.input-group textarea::placeholder{color:var(--text3)}
.toggle{position:relative;width:44px;height:26px;border-radius:13px;background:var(--border-light);cursor:pointer;transition:background .15s;flex-shrink:0}
.toggle.on{background:var(--success)}
.toggle::after{content:'';position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.15);transition:transform .15s}
.toggle.on::after{transform:translateX(18px)}
.page{display:none;height:100vh;flex-direction:column}
.page.active{display:flex}
.auth-page{align-items:center;justify-content:center;background:var(--bg2);padding:20px}
.auth-card{background:var(--bg);border-radius:var(--r-xl);padding:40px 36px;width:100%;max-width:400px;box-shadow:var(--shadow-lg)}
.auth-card .logo{text-align:center;margin-bottom:24px}
.auth-card .logo .icon{font-size:48px;margin-bottom:12px}
.auth-card .logo h1{font-size:22px;font-weight:600}
.auth-card .logo p{font-size:14px;color:var(--text2);margin-top:6px}
.navbar{height:var(--nav-h);background:var(--bg);border-bottom:1px solid var(--border-light);display:flex;align-items:center;padding:0 24px;flex-shrink:0;gap:16px;z-index:10}
.navbar .brand{font-size:18px;font-weight:700;display:flex;align-items:center;gap:8px;white-space:nowrap}
.navbar .nav-links{display:flex;gap:4px;margin-left:24px}
.navbar .nav-links button{padding:8px 16px;border-radius:var(--r-md);font-size:14px;font-weight:500;color:var(--text2);background:transparent;transition:all .15s}
.navbar .nav-links button:hover{background:var(--bg2)}
.navbar .nav-links button.active{color:var(--primary);background:var(--primary-light)}
.navbar .spacer{flex:1}
.navbar .user-menu{position:relative}
.navbar .user-btn{display:flex;align-items:center;gap:8px;padding:6px 12px;border-radius:var(--r-md);background:transparent;font-size:14px;color:var(--text1);transition:background .15s}
.navbar .user-btn:hover{background:var(--bg2)}
.navbar .user-btn .avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:#fff}
.user-dropdown{position:absolute;top:calc(100% + 8px);right:0;background:var(--bg);border-radius:var(--r-lg);box-shadow:var(--shadow-lg);min-width:180px;padding:6px;z-index:100;display:none}
.user-dropdown.show{display:block;animation:fadeIn .15s}
.user-dropdown button{width:100%;text-align:left;padding:10px 14px;border-radius:var(--r-sm);font-size:14px;color:var(--text1);background:transparent;display:block}
.user-dropdown button:hover{background:var(--bg2)}
.user-dropdown button.danger{color:var(--error)}
.user-dropdown .divider{height:1px;background:var(--border-light);margin:4px 0}
.cal-header{display:flex;align-items:center;padding:16px 24px;gap:12px;flex-wrap:wrap;background:var(--bg);border-bottom:1px solid var(--border-light)}
.week-nav{display:flex;align-items:center;gap:8px}
.week-nav .arrow{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--bg2);font-size:18px;color:var(--text2);transition:all .15s}
.week-nav .arrow:hover{background:var(--bg3);color:var(--text1)}
.week-nav .week-title{font-size:16px;font-weight:600;min-width:180px;text-align:center}
.member-filter{position:relative}
.member-filter .filter-btn{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:var(--r-md);background:var(--bg2);font-size:14px;color:var(--text1);transition:all .15s}
.member-filter .filter-btn:hover{background:var(--bg3)}
.filter-dropdown{position:absolute;top:calc(100% + 6px);left:0;background:var(--bg);border-radius:var(--r-lg);box-shadow:var(--shadow-lg);min-width:220px;max-height:300px;overflow-y:auto;padding:6px;z-index:50;display:none}
.filter-dropdown.show{display:block;animation:fadeIn .15s}
.filter-dropdown button{width:100%;text-align:left;padding:9px 12px;border-radius:var(--r-sm);font-size:14px;display:flex;align-items:center;gap:8px;background:transparent;color:var(--text1)}
.filter-dropdown button:hover{background:var(--bg2)}
.filter-dropdown button.selected{background:var(--primary-light);color:var(--primary);font-weight:500}
.filter-dropdown .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.filter-dropdown .hidden-tag{font-size:11px;color:var(--text3);margin-left:auto}
.cal-body{flex:1;overflow:auto;background:var(--bg);position:relative;display:flex;flex-direction:column}
.cal-grid{display:grid;min-width:100%;position:relative}
.cal-grid .time-col{width:56px;flex-shrink:0}
.day-header{position:sticky;top:0;z-index:5;background:var(--bg);text-align:center;padding:8px 0;border-bottom:1px solid var(--border-light);font-size:13px;color:var(--text2);height:52px;display:flex;flex-direction:column;justify-content:center;align-items:center}
.day-header .day-num{font-size:20px;font-weight:600;color:var(--text1);display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:50%;margin-top:1px}
.day-header .day-num.today{background:var(--primary);color:#fff;width:32px;height:32px}
.time-label{font-size:11px;color:var(--text3);text-align:right;padding-right:8px;height:56px;line-height:0;position:relative;top:-6px}
.day-col{position:relative;border-left:1px solid var(--border-light);min-height:calc(56px * 24)}
.day-col .hour-slot{height:56px;border-bottom:1px solid var(--border-light);cursor:pointer;transition:background .1s}
.day-col .hour-slot:hover{background:var(--primary-light)}
.day-col .hour-slot.drag-selecting{background:var(--primary-light)}
.day-col .hour-slot.drag-selected{background:rgba(0,122,255,.15);border-bottom-color:rgba(0,122,255,.3)}
.day-col.today-col{background:rgba(0,122,255,.02)}
.event-block{position:absolute;left:2px;right:2px;border-radius:6px;padding:4px 8px 4px 12px;font-size:11px;overflow:hidden;cursor:pointer;z-index:2;border-left:3.5px solid;transition:background .18s ease,color .18s ease,box-shadow .18s ease;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.event-block:hover{box-shadow:0 2px 8px rgba(0,0,0,.12);transform:scale(1.008)}
.event-block.selected{box-shadow:0 2px 12px rgba(0,0,0,.18)}
.event-block .ev-title{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
.event-block .ev-time{font-size:10px;opacity:.65;margin-top:2px;font-weight:400}
.event-block:hover .ev-time,.event-block.selected .ev-time{opacity:.85}
.color-picker{display:flex;gap:10px;padding:6px 0}
.color-picker .color-dot{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;transition:all .15s;position:relative;flex-shrink:0}
.color-picker .color-dot:hover{transform:scale(1.18)}
.color-picker .color-dot.active{border-color:#1D1D1F;box-shadow:0 0 0 2px #fff,0 0 0 4px currentColor}
.color-picker .color-dot.active::after{content:'✓';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:700;text-shadow:0 1px 2px rgba(0,0,0,.3)}
.time-indicator{position:absolute;left:0;right:0;z-index:3;pointer-events:none;display:flex;align-items:center}
.time-indicator .dot{width:8px;height:8px;border-radius:50%;background:var(--error);margin-left:-4px;flex-shrink:0}
.time-indicator .line{flex:1;height:2px;background:var(--error)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);backdrop-filter:blur(4px);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex;animation:fadeIn .2s}
.modal{background:var(--bg);border-radius:var(--r-lg);width:100%;max-width:500px;max-height:85vh;overflow-y:auto;box-shadow:var(--shadow-xl);animation:slideUp .25s ease}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:20px 24px 0;position:sticky;top:0;background:var(--bg);z-index:1}
.modal-head h2{font-size:18px;font-weight:600}
.modal-close{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--bg2);font-size:18px;color:var(--text2);transition:all .15s}
.modal-close:hover{background:var(--bg3);color:var(--text1)}
.modal-body{padding:20px 24px 24px}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;padding-top:16px;border-top:1px solid var(--border-light);margin-top:16px}
.img-upload-area{display:flex;flex-wrap:wrap;gap:8px;padding:12px;border:2px dashed var(--border);border-radius:var(--r-md);min-height:80px;transition:border-color .15s,background .15s;cursor:pointer}
.img-upload-area:hover,.img-upload-area.dragover{border-color:var(--primary);background:var(--primary-light)}
.img-thumb{position:relative;width:64px;height:64px;border-radius:var(--r-sm);overflow:hidden}
.img-thumb img{width:100%;height:100%;object-fit:cover}
.img-thumb .remove{position:absolute;top:2px;right:2px;width:18px;height:18px;border-radius:50%;background:var(--error);color:#fff;font-size:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0;transition:opacity .15s}
.img-thumb:hover .remove{opacity:1}
.img-add-btn{width:64px;height:64px;border-radius:var(--r-sm);border:2px dashed var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text3);font-size:11px;gap:2px;cursor:pointer;transition:all .15s}
.img-add-btn:hover{border-color:var(--primary);color:var(--primary)}
.img-add-btn .plus{font-size:22px;line-height:1}
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:300;display:none;align-items:center;justify-content:center;flex-direction:column}
.lightbox.show{display:flex;animation:fadeIn .2s}
.lightbox img{max-width:90vw;max-height:75vh;object-fit:contain;border-radius:var(--r-md)}
.lightbox .lb-close{position:absolute;top:16px;right:16px;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.15);color:#fff;font-size:22px;display:flex;align-items:center;justify-content:center}
.lightbox .lb-nav{position:absolute;top:50%;transform:translateY(-50%);width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,.15);color:#fff;font-size:24px;display:flex;align-items:center;justify-content:center}
.lightbox .lb-prev{left:16px}
.lightbox .lb-next{right:16px}
.lightbox .lb-counter{color:rgba(255,255,255,.7);font-size:14px;margin-top:16px}
.team-page .team-head{padding:24px;background:var(--bg);border-bottom:1px solid var(--border-light);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.team-page .team-head h1{font-size:22px;font-weight:600}
.team-page .team-actions{display:flex;gap:10px;align-items:center}
.team-page .search-input{height:38px;padding:0 14px;border:1.5px solid var(--border);border-radius:var(--r-md);font-size:14px;width:200px}
.team-page .search-input:focus{border-color:var(--primary)}
.member-list{padding:16px 24px;display:flex;flex-direction:column;gap:8px}
.member-card{display:flex;align-items:center;gap:14px;padding:14px 18px;background:var(--bg);border-radius:var(--r-lg);box-shadow:var(--shadow-sm);transition:box-shadow .15s}
.member-card:hover{box-shadow:var(--shadow-md)}
.member-card .avatar{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:600;color:#fff;flex-shrink:0}
.member-card .info{flex:1;min-width:0}
.member-card .name{font-size:15px;font-weight:600;display:flex;align-items:center;gap:6px}
.member-card .name .role-icon{font-size:16px;line-height:1}
.member-card .role-tag{display:inline-block;font-size:11px;font-weight:500;padding:2px 8px;border-radius:var(--r-full);margin-top:3px}
.role-super{background:#FFF3CD;color:#856404}
.role-admin{background:var(--primary-light);color:var(--primary)}
.role-member{background:var(--bg3);color:var(--text2)}
.member-card .vis-status{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text2);white-space:nowrap}
.member-card .vis-dot{width:8px;height:8px;border-radius:50%}
.member-card .actions{position:relative}
.member-card .more-btn{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:transparent;font-size:20px;color:var(--text3);transition:all .15s}
.member-card .more-btn:hover{background:var(--bg2);color:var(--text1)}
.member-menu{position:absolute;top:calc(100% + 4px);right:0;background:var(--bg);border-radius:var(--r-lg);box-shadow:var(--shadow-lg);min-width:180px;padding:6px;z-index:30;display:none}
.member-menu.show{display:block;animation:fadeIn .15s}
.member-menu button{width:100%;text-align:left;padding:9px 14px;border-radius:var(--r-sm);font-size:14px;background:transparent;display:flex;align-items:center;gap:8px;color:var(--text1)}
.member-menu button:hover{background:var(--bg2)}
.member-menu button.danger{color:var(--error)}
.member-menu .divider{height:1px;background:var(--border-light);margin:4px 0}
.settings-page .settings-content{max-width:500px;margin:0 auto;padding:32px 24px}
.settings-page h1{font-size:22px;font-weight:600;margin-bottom:24px}
.settings-card{background:var(--bg);border-radius:var(--r-lg);padding:24px;box-shadow:var(--shadow-sm)}
.toast-container{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:500;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{padding:12px 20px;border-radius:var(--r-md);background:var(--bg);box-shadow:var(--shadow-lg);font-size:14px;display:flex;align-items:center;gap:8px;pointer-events:auto;animation:slideDown .25s;min-width:200px;max-width:400px}
.toast.success{border-left:4px solid var(--success)}
.toast.error{border-left:4px solid var(--error)}
.toast.warning{border-left:4px solid var(--warning)}
.toast.info{border-left:4px solid var(--primary)}
.toast.fade-out{animation:fadeOut .2s forwards}
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);backdrop-filter:blur(4px);z-index:250;display:none;align-items:center;justify-content:center;padding:20px}
.confirm-overlay.show{display:flex;animation:fadeIn .15s}
.confirm-box{background:var(--bg);border-radius:var(--r-lg);padding:28px;width:100%;max-width:380px;text-align:center;box-shadow:var(--shadow-xl);animation:scaleIn .2s}
.confirm-box .confirm-icon{font-size:36px;margin-bottom:12px}
.confirm-box h3{font-size:17px;font-weight:600;margin-bottom:8px}
.confirm-box p{font-size:14px;color:var(--text2);margin-bottom:20px;line-height:1.5}
.confirm-box .confirm-actions{display:flex;gap:10px;justify-content:center}
.confirm-box .confirm-actions .btn{min-width:100px}
.empty-state{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-state .icon{font-size:48px;margin-bottom:12px}
.empty-state p{font-size:14px}
.tab-bar{display:none;height:var(--tab-h);background:var(--bg);border-top:1px solid var(--border-light);padding-bottom:env(safe-area-inset-bottom)}
.tab-bar .tabs{display:flex;height:100%}
.tab-bar .tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-size:10px;color:var(--text3);background:transparent;transition:color .15s}
.tab-bar .tab.active{color:var(--primary)}
.tab-bar .tab .tab-icon{font-size:22px}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeOut{from{opacity:1}to{opacity:0}}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
@keyframes pulse{0%{transform:scale(0)}60%{transform:scale(1.05)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
.loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,.8);z-index:999;display:flex;align-items:center;justify-content:center}
.loading-spinner{width:40px;height:40px;border:3px solid var(--bg3);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite}
.login-progress{margin-top:20px;text-align:center}
.login-progress .progress-bar{height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;margin-bottom:8px}
.login-progress .progress-fill{height:100%;background:linear-gradient(90deg,var(--primary),#5AC8FA);border-radius:3px;transition:width .4s ease;width:0}
.login-progress .progress-text{font-size:13px;color:var(--text2);animation:pulse-text 1.5s ease infinite}
@keyframes pulse-text{0%,100%{opacity:.6}50%{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:768px){
  :root{--nav-h:56px}
  .navbar{padding:0 16px;gap:10px}
  .navbar .brand{font-size:16px}
  .navbar .nav-links{display:none}
  .cal-header{padding:10px 16px;gap:6px}
  .week-nav .week-title{font-size:13px;min-width:120px}
  .member-filter{display:none}
  .tab-bar{display:block}
  .page.has-tabs{padding-bottom:var(--tab-h)}
  .modal{max-width:100%;border-radius:16px 16px 0 0;max-height:88vh;position:fixed;bottom:0;left:0;right:0}
  .cal-body .time-label{font-size:10px}
  .auth-card{padding:28px 24px}
  /* Mobile day tabs */
  .mobile-day-tabs{display:flex;background:var(--bg);border-bottom:1px solid var(--border-light);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .mobile-day-tabs::-webkit-scrollbar{display:none}

<script>
// ===== SUPABASE CONFIG =====
const SUPABASE_URL = 'https://mbdkqwtvxaijiwppgpxa.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1iZGtxd3R2eGFpaml3cHBncHhhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4ODk2NjcsImV4cCI6MjA5ODQ2NTY2N30.mCzMZ4ex0HFpCaOl79-wA_LolbXujy43wySiIDrdPQM';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ===== STATE =====
let currentUser = null;
let allUsers = [];
let allEvents = [];
let currentWeekStart = getMonday(new Date());
let filterUserId = 'all';
let editingEventId = null;
let currentDetailEventId = null;
let uploadImages = [];
let lbImages = []; let lbIndex = 0;
let resetPwdTargetId = null;
const COLORS = ['#007AFF','#AF52DE','#FF2D55','#FF9500','#34C759','#5AC8FA','#5856D6','#FF3B30','#FFCC00','#00C7BE'];
const EVENT_COLORS = ['#FF3B30','#007AFF','#34C759','#AF52DE','#FF9500'];
let selectedEventColor = EVENT_COLORS[1]; // default blue

// ===== HELPERS =====
function getMonday(d) { const dt = new Date(d); const day = dt.getDay(); const diff = dt.getDate() - day + (day === 0 ? -6 : 1); dt.setDate(diff); dt.setHours(0,0,0,0); return dt; }
function fmtDate(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function fmtDateCN(d) { return `${d.getMonth()+1}月${d.getDate()}日`; }
function fmtDateFull(d) { const w = ['日','一','二','三','四','五','六']; return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（周${w[d.getDay()]}）`; }
function isToday(d) { const t = new Date(); return d.getFullYear() === t.getFullYear() && d.getMonth() === t.getMonth() && d.getDate() === t.getDate(); }
function getUserColor(user) { return COLORS[(user.id - 1) % COLORS.length]; }
function getInitial(name) { return name ? name.charAt(0) : '?'; }
function isSuperAdmin() { return currentUser && currentUser.role === 'super'; }
function isAdmin() { return currentUser && (currentUser.role === 'admin' || currentUser.role === 'super'); }
function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

// ===== SUPABASE CRUD =====
async function fetchUsers() { const { data, error } = await sb.from('users').select('*').order('id'); if (error) throw error; return data || []; }
async function fetchEvents() { const { data, error } = await sb.from('events').select('*').order('id'); if (error) throw error; return data || []; }
async function insertUser(obj) { const { data, error } = await sb.from('users').insert(obj).select().single(); if (error) throw error; return data; }
async function updateUser(id, obj) { const { data, error } = await sb.from('users').update(obj).eq('id', id).select().single(); if (error) throw error; return data; }
async function deleteUser(id) { const { error } = await sb.from('users').delete().eq('id', id); if (error) throw error; }
async function insertEvent(obj) { const { data, error } = await sb.from('events').insert(obj).select().single(); if (error) throw error; return data; }
async function updateEvent(id, obj) { const { data, error } = await sb.from('events').update(obj).eq('id', id).select().single(); if (error) throw error; return data; }
async function deleteEvent(id) { const { error } = await sb.from('events').delete().eq('id', id); if (error) throw error; }

// ===== TOAST =====
function toast(msg, type = 'info') { const c = document.getElementById('toast-container'); const t = document.createElement('div'); t.className = `toast ${type}`; const icons = { success: '✅', error: '❌', warning: '⚠️', info: 'ℹ️' }; t.innerHTML = `<span>${icons[type]||''}</span><span>${msg}</span>`; c.appendChild(t); setTimeout(() => { t.classList.add('fade-out'); setTimeout(() => t.remove(), 200); }, 3000); }

// ===== CONFIRM =====
let confirmCallback = null;
function showConfirm(title, msg, okText, okClass, cb, extra = '') { document.getElementById('confirm-icon').textContent = '⚠️'; document.getElementById('confirm-title').textContent = title; document.getElementById('confirm-msg').innerHTML = msg; document.getElementById('confirm-extra').innerHTML = extra; const btn = document.getElementById('confirm-ok'); btn.textContent = okText; btn.className = `btn ${okClass}`; confirmCallback = cb; document.getElementById('confirm-dialog').classList.add('show'); }
function closeConfirm() { document.getElementById('confirm-dialog').classList.remove('show'); confirmCallback = null; }
document.getElementById('confirm-ok').onclick = () => { if (confirmCallback) confirmCallback(); closeConfirm(); };

// ===== MODAL =====
function openModal(id) { document.getElementById(id).classList.add('show'); }
function closeModal(id) {
  document.getElementById(id).classList.remove('show');
  if (id === 'modal-detail' && selectedBlockEl) {
    selectedBlockEl.classList.remove('selected');
    const c = selectedBlockEl.dataset.evColor;
    selectedBlockEl.style.background = `${c}1A`;
    selectedBlockEl.style.color = '#1D1D1F';
    selectedBlockEl = null;
  }
}

// ===== AUTH =====
async function doSetup() {
  const name = document.getElementById('setup-name').value.trim();
  const pwd = document.getElementById('setup-pwd').value;
  const pwd2 = document.getElementById('setup-pwd2').value;
  if (!name) return toast('请输入姓名', 'error');
  if (name.length > 20) return toast('姓名不能超过20个字符', 'error');
  if (pwd.length < 6) return toast('密码至少6位', 'error');
  if (pwd !== pwd2) return toast('两次密码不一致', 'error');
  try {
    const users = await fetchUsers();
    if (users.find(u => u.name === name)) return toast('该姓名已被使用', 'error');
    const user = await insertUser({ name, password: pwd, role: 'super', visible: true });
    currentUser = user;
    localStorage.setItem('tc_session', JSON.stringify({ userId: user.id, remember: true, ts: Date.now() }));
    toast(`欢迎，${name}！`, 'success');
    await loadApp();
    showPage('calendar');
  } catch (e) { toast('创建失败: ' + e.message, 'error'); }
}

function setLoginProgress(pct, text) {
  const bar = document.getElementById('login-progress');
  const fill = document.getElementById('login-progress-fill');
  const txt = document.getElementById('login-progress-text');
  if (bar) bar.style.display = 'block';
  if (fill) fill.style.width = pct + '%';
  if (txt) txt.textContent = text;
}

async function doLogin() {
  const name = document.getElementById('login-name').value.trim();
  const pwd = document.getElementById('login-pwd').value;
  const remember = document.getElementById('login-remember').checked;
  if (!name || !pwd) return toast('请输入姓名和密码', 'error');
  if (typeof supabase === 'undefined') return toast('页面加载未完成，请刷新页面后重试', 'error');
  const btn = document.querySelector('#page-login .btn-primary');
  btn.disabled = true;
  btn.textContent = '登录中...';
  setLoginProgress(10, '连接服务器...');
  let retries = 2;
  while (retries >= 0) {
    try {
      setLoginProgress(25, '正在验证身份...');
      // Parallel: fetch users + events at the same time (was 3 calls, now 2)
      const [users, events] = await Promise.all([fetchUsers(), fetchEvents()]);
      setLoginProgress(70, '验证成功，加载数据...');
      const user = users.find(u => u.name === name && u.password === pwd);
      if (!user) {
        setLoginProgress(0, '');
        document.getElementById('login-progress').style.display = 'none';
        btn.disabled = false;
        btn.textContent = '登 录';
        return toast('姓名或密码错误', 'error');
      }
      currentUser = user;
      allUsers = users;
      allEvents = events;
      localStorage.setItem('tc_session', JSON.stringify({ userId: user.id, remember, ts: Date.now() }));
      setLoginProgress(90, '准备日历...');
      updateNavUser();
      updateTeamVisibility();
      setLoginProgress(100, `欢迎回来，${user.name}！`);
      toast(`欢迎回来，${user.name}！`, 'success');
      await new Promise(r => setTimeout(r, 400));
      document.getElementById('login-progress').style.display = 'none';
      showPage('calendar');
      return;
    } catch (e) {
      const msg = e.message || String(e);
      if (retries > 0 && (msg.includes('fetch') || msg.includes('network') || msg.includes('Failed') || msg.includes('timeout') || msg.includes('Load'))) {
        setLoginProgress(10, `网络不稳定，重试中(${retries})...`);
        retries--;
        await new Promise(r => setTimeout(r, 2000));
        continue;
      }
      document.getElementById('login-progress').style.display = 'none';
      toast('登录失败: ' + msg, 'error');
      btn.disabled = false;
      btn.textContent = '登 录';
      return;
    }
  }
}

async function doChangePassword() {

async function checkSession() {

  if (!s) return false;
  try {

function goToday() { currentWeekStart = getMonday(new Date()); renderCalendar(); }
function getWeekNumber(d) { const oneJan = new Date(d.getFullYear(), 0, 1); return Math.ceil(((d - oneJan) / 86400000 + oneJan.getDay() + 1) / 7); }

    filterWrap.innerHTML = `<button class="filter-btn" onclick="this.parentElement.querySelector('.filter-dropdown').classList.toggle('show')">${filterLabel} <span style="font-size:10px;margin-left:4px">▾</span></button><div class="filter-dropdown" id="mobile-filter-dropdown"></div>`;

  const wrapper = document.createElement('div');

  const daysContainer = document.createElement('div');

  for (let i = 0; i < colCount; i++) {

    const d = days[di];

    const header = document.createElement('div');

  renderFilterDropdown();
  setupDragSelect();

// ===== DRAG SELECT TIME RANGE =====
let dragState = null; // { date, startHour, endHour, slots: [] }

function setupDragSelect() {
  const body = document.getElementById('cal-body');
  if (!body) return;

  body.addEventListener('mousedown', e => {
    const slot = e.target.closest('.hour-slot');
    if (!slot) return;
    const slotsWrap = slot.parentElement;
    if (!slotsWrap || !slotsWrap.dataset.date) return;
    // Don't start drag on event blocks
    if (e.target.closest('.event-block')) return;
    e.preventDefault();
    const hour = parseInt(slot.dataset.hour);
    dragState = {
      date: slotsWrap.dataset.date,
      startHour: hour,
      endHour: hour,
      active: true
    };
    slot.classList.add('drag-selecting');
    dragState.slots = [slot];
  });

  body.addEventListener('mousemove', e => {
    if (!dragState || !dragState.active) return;
    const slot = e.target.closest('.hour-slot');
    if (!slot) return;
    const slotsWrap = slot.parentElement;
    if (!slotsWrap || slotsWrap.dataset.date !== dragState.date) return;
    const hour = parseInt(slot.dataset.hour);
    dragState.endHour = hour;
    // Highlight range
    const minH = Math.min(dragState.startHour, dragState.endHour);
    const maxH = Math.max(dragState.startHour, dragState.endHour);
    // Clear previous
    dragState.slots.forEach(s => s.classList.remove('drag-selecting'));
    dragState.slots = [];
    const allSlots = slotsWrap.querySelectorAll('.hour-slot');
    for (let h = minH; h <= maxH; h++) {
      allSlots[h].classList.add('drag-selecting');
      dragState.slots.push(allSlots[h]);
    }
  });
}

document.addEventListener('mouseup', () => {
  if (!dragState || !dragState.active) return;
  // Clean up highlights
  dragState.slots.forEach(s => s.classList.remove('drag-selecting'));
  const minH = Math.min(dragState.startHour, dragState.endHour);
  const maxH = Math.max(dragState.startHour, dragState.endHour);
  const date = dragState.date;
  dragState.active = false;
  dragState = null;
  // Open create form with time range
  openCreateAtRange(date, minH, maxH + 1);
});

function openCreateAtRange(date, startHour, endHour) {

let mobileDayIndex = 0;
function getMobileCurrentDay(days) { for (let i = 0; i < 7; i++) { if (isToday(days[i])) return i; } return Math.min(Math.max(mobileDayIndex, 0), 6); }
function setupMobileSwipe(el, days, currentIdx) {
  let startX = 0, startY = 0;
  el.addEventListener('touchstart', e => { startX = e.touches[0].clientX; startY = e.touches[0].clientY; }, { passive: true });
  el.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - startX;
    const dy = e.changedTouches[0].clientY - startY;
    if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy)) {
      if (dx < 0 && currentIdx < 6) { mobileDayIndex = currentIdx + 1; renderCalendar(); }
      else if (dx > 0 && currentIdx > 0) { mobileDayIndex = currentIdx - 1; renderCalendar(); }
    }
  }, { passive: true });
}

function getFilteredEvents(dateStr) {
  let events = allEvents.filter(ev => ev.date === dateStr);
  if (filterUserId === 'mine') {
    events = events.filter(ev => ev.user_id === currentUser.id);
  } else if (filterUserId === 'all') {
    if (!isAdmin()) { events = events.filter(ev => ev.user_id === currentUser.id); }
    else if (isSuperAdmin()) { /* sees all */ }
    else { const visibleIds = allUsers.filter(u => u.visible || u.id === currentUser.id).map(u => u.id); events = events.filter(ev => visibleIds.includes(ev.user_id)); }
  } else { events = events.filter(ev => ev.user_id == filterUserId); }
  return events;
}

let selectedBlockEl = null;

function createEventBlock(ev) {
  const color = ev.color || EVENT_COLORS[1];
  const startParts = (ev.start_time || '00:00').split(':');
  const endParts = (ev.end_time || '01:00').split(':');
  const startMin = parseInt(startParts[0]) * 60 + parseInt(startParts[1]);
  const endMin = parseInt(endParts[0]) * 60 + parseInt(endParts[1]);
  const durationMin = Math.max(endMin - startMin, 15);
  const top = (startMin / 60) * 56;
  const height = Math.max((durationMin / 60) * 56, 24);
  const block = document.createElement('div');
  block.className = 'event-block';
  block.dataset.evColor = color;
  block.dataset.evId = ev.id;
  block.style.cssText = `top:${top}px;height:${height}px;border-left-color:${color};background:${color}1A;color:#1D1D1F`;
  block.innerHTML = `<div class="ev-title">${esc(ev.title)}</div>${height > 30 ? `<div class="ev-time">${ev.start_time.slice(0,5)} - ${ev.end_time.slice(0,5)}</div>` : ''}`;
  // Hover: full color fill + white text
  block.addEventListener('mouseenter', () => {
    if (!block.classList.contains('selected')) {
      block.style.background = color;
      block.style.color = '#fff';
    }
  });
  block.addEventListener('mouseleave', () => {
    if (!block.classList.contains('selected')) {
      block.style.background = `${color}1A`;
      block.style.color = '#1D1D1F';
    }
  });
  block.onclick = e => { e.stopPropagation(); selectAndShowEvent(ev.id, block); };
  return block;
}

function selectAndShowEvent(id, block) {
  // Deselect previous
  if (selectedBlockEl && selectedBlockEl !== block) {
    selectedBlockEl.classList.remove('selected');
    const pc = selectedBlockEl.dataset.evColor;
    selectedBlockEl.style.background = `${pc}1A`;
    selectedBlockEl.style.color = '#1D1D1F';
  }
  // Select new
  const c = block.dataset.evColor;
  block.classList.add('selected');
  block.style.background = c;
  block.style.color = '#fff';
  selectedBlockEl = block;
  showEventDetail(id);
}

async function saveEvent() {
  const title = document.getElementById('ev-title').value.trim();
  const date = document.getElementById('ev-date').value;
  const startTime = document.getElementById('ev-start').value;
  const endTime = document.getElementById('ev-end').value;
  const desc = document.getElementById('ev-desc').value.trim();
  if (!title) return toast('请输入标题', 'error');
  if (title.length > 50) return toast('标题不能超过50个字符', 'error');
  if (!date) return toast('请选择日期', 'error');
  if (!startTime) return toast('请选择开始时间', 'error');
  if (!endTime) return toast('请选择结束时间', 'error');
  if (endTime <= startTime) return toast('结束时间须晚于开始时间', 'error');
  // Show loading on button
  const btn = document.getElementById('btn-save-event');
  const btnOrigText = btn.textContent;
  btn.disabled = true; btn.textContent = '保存中...';
  try {
    const evData = { title, date, start_time: startTime, end_time: endTime, description: desc, images: [...uploadImages], color: selectedEventColor, user_id: currentUser.id, updated_at: new Date().toISOString() };
    // Optimistic UI: add locally first for instant feedback
    const localEv = { ...evData, id: editingEventId || Date.now(), created_at: new Date().toISOString() };
    if (editingEventId) {
      const idx = allEvents.findIndex(e => e.id === editingEventId);
      if (idx >= 0) allEvents[idx] = { ...allEvents[idx], ...localEv };
      toast('日程已更新', 'success');
    } else {
      allEvents.push(localEv);
      toast('日程已创建', 'success');
    }
    closeModal('modal-event-form');
    renderCalendar();
    // Sync with server in background
    try {
      if (editingEventId) {
        await updateEvent(editingEventId, evData);
      } else {
        const serverEv = await insertEvent(evData);
        const tempIdx = allEvents.findIndex(e => e.id === localEv.id);
        if (tempIdx >= 0) allEvents[tempIdx] = serverEv;
        renderCalendar();
      }
    } catch(syncErr) {
      // If color column doesn't exist, retry without it
      if (syncErr.message && (syncErr.message.includes('color') || syncErr.message.includes('column'))) {
        const evDataNoColor = { ...evData }; delete evDataNoColor.color;
        if (editingEventId) { await updateEvent(editingEventId, evDataNoColor); }
        else {
          const serverEv = await insertEvent(evDataNoColor);
          const tempIdx = allEvents.findIndex(e => e.id === localEv.id);
          if (tempIdx >= 0) allEvents[tempIdx] = { ...serverEv, color: selectedEventColor };
          renderCalendar();
        }
      } else { throw syncErr; }
    }
    // Refresh full list to stay in sync
    fetchEvents().then(data => { allEvents = data; renderCalendar(); }).catch(() => {});
  } catch (e) { toast('保存失败: ' + e.message, 'error'); }
  btn.disabled = false; btn.textContent = btnOrigText;
}

function showEventDetail(id) {
  currentDetailEventId = id;
  const ev = allEvents.find(e => e.id === id);
  if (!ev) return;
  const user = allUsers.find(u => u.id === ev.user_id);
  const dateObj = new Date(ev.date + 'T00:00:00');
  document.getElementById('detail-title').textContent = ev.title;
  let html = `<div style="margin-bottom:12px">
    <div style="font-size:14px;color:var(--text2);margin-bottom:4px">📅 ${fmtDateFull(dateObj)}</div>
    <div style="font-size:14px;color:var(--text2);margin-bottom:4px">🕐 ${ev.start_time.slice(0,5)} — ${ev.end_time.slice(0,5)}</div>
    <div style="font-size:14px;color:var(--text2);display:flex;align-items:center;gap:6px">👤 创建人：${esc(user ? user.name : '未知')}${ev.color ? `<span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${ev.color};flex-shrink:0"></span>` : ''}</div>
  </div>`;
  if (ev.description) html += `<div style="margin-bottom:12px"><div style="font-size:13px;font-weight:500;color:var(--text2);margin-bottom:4px">描述</div><div style="font-size:14px;line-height:1.6;white-space:pre-wrap">${esc(ev.description)}</div></div>`;
  if (ev.images && ev.images.length) {
    html += `<div style="margin-bottom:12px"><div style="font-size:13px;font-weight:500;color:var(--text2);margin-bottom:8px">📎 图片（${ev.images.length}张）</div><div style="display:flex;flex-wrap:wrap;gap:8px">`;
    ev.images.forEach((img, i) => { html += `<div style="width:80px;height:80px;border-radius:6px;overflow:hidden;cursor:pointer" onclick='openLightbox(${JSON.stringify(JSON.stringify(ev.images))},${i})'><img src="${img}" style="width:100%;height:100%;object-fit:cover"></div>`; });
    html += `</div></div>`;
  }
  if (ev.created_at) html += `<div style="font-size:12px;color:var(--text3);margin-top:8px">创建于 ${new Date(ev.created_at).toLocaleString('zh-CN')}</div>`;
  document.getElementById('detail-content').innerHTML = html;
  const actions = document.querySelector('#modal-detail .modal-actions');
  const canEdit = (ev.user_id === currentUser.id) || isAdmin();
  actions.style.display = canEdit ? 'flex' : 'none';
  openModal('modal-detail');
}

function editCurrentEvent() {
  const ev = allEvents.find(e => e.id === currentDetailEventId);
  if (!ev) return;
  closeModal('modal-detail');
  editingEventId = ev.id;
  document.getElementById('form-title').textContent = '编辑日程';
  document.getElementById('btn-save-event').textContent = '保存';
  document.getElementById('ev-title').value = ev.title;
  document.getElementById('ev-date').value = ev.date;
  document.getElementById('ev-start').value = ev.start_time;
  document.getElementById('ev-end').value = ev.end_time;
  document.getElementById('ev-desc').value = ev.description || '';
  selectedEventColor = ev.color || EVENT_COLORS[1]; renderColorPicker();
  uploadImages = [...(ev.images || [])];
  renderImagePreview();
  openModal('modal-event-form');
}

function deleteCurrentEvent() {
  showConfirm('确认删除日程？', '删除后无法恢复。', '删除', 'btn-danger', async () => {
    try {
      await deleteEvent(currentDetailEventId);
      allEvents = await fetchEvents();
      closeModal('modal-detail');
      renderCalendar();
      toast('日程已删除', 'success');
    } catch (e) { toast('删除失败: ' + e.message, 'error'); }
  });
}

// ===== IMAGE UPLOAD =====
function handleFiles(files) {
  Array.from(files).forEach(f => {
    if (!f.type.startsWith('image/')) return toast(`${f.name} 不是图片格式`, 'error');
    if (f.size > 5 * 1024 * 1024) return toast(`${f.name} 超过5MB限制`, 'error');
    const reader = new FileReader();
    reader.onload = e => { uploadImages.push(e.target.result); renderImagePreview(); };
    reader.readAsDataURL(f);
  });
  document.getElementById('img-file-input').value = '';
}
function handleDrop(e) { e.preventDefault(); e.currentTarget.classList.remove('dragover'); handleFiles(e.dataTransfer.files); }
function removeImage(idx) { uploadImages.splice(idx, 1); renderImagePreview(); }
function renderImagePreview() {
  const area = document.getElementById('img-upload-area');
  let html = '';
  uploadImages.forEach((img, i) => { html += `<div class="img-thumb"><img src="${img}"><div class="remove" onclick="event.stopPropagation();removeImage(${i})">✕</div></div>`; });
  html += `<div class="img-add-btn"><span class="plus">＋</span><span>添加</span></div>`;
  area.innerHTML = html;
}

// ===== LIGHTBOX =====
function openLightbox(imagesJson, index) {
  lbImages = JSON.parse(imagesJson);
  lbIndex = index || 0;
  updateLightbox();
  document.getElementById('lightbox').classList.add('show');
}
function closeLightbox() { document.getElementById('lightbox').classList.remove('show'); }
function lbNav(dir) { lbIndex = (lbIndex + dir + lbImages.length) % lbImages.length; updateLightbox(); }
function updateLightbox() { document.getElementById('lb-img').src = lbImages[lbIndex]; document.getElementById('lb-counter').textContent = `${lbIndex + 1} / ${lbImages.length}`; }
document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('show')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') lbNav(-1);
  if (e.key === 'ArrowRight') lbNav(1);
});

// ===== TEAM =====
function openAddMember() { document.getElementById('m-name').value = ''; document.getElementById('m-pwd').value = ''; openModal('modal-add-member'); }

async function saveMember() {
  const name = document.getElementById('m-name').value.trim();
  const pwd = document.getElementById('m-pwd').value;
  if (!name) return toast('请输入姓名', 'error');
  if (name.length > 20) return toast('姓名不能超过20个字符', 'error');
  if (pwd.length < 6) return toast('密码至少6位', 'error');
  try {
    const users = await fetchUsers();
    if (users.find(u => u.name === name)) return toast('该姓名已被使用', 'error');
    await insertUser({ name, password: pwd, role: 'member', visible: true });
    allUsers = await fetchUsers();
    closeModal('modal-add-member');
    renderMembers();
    renderCalendar();
    toast(`已创建成员 ${name}`, 'success');
  } catch (e) { toast('创建失败: ' + e.message, 'error'); }
}

function renderMembers(search = '') {
  const list = document.getElementById('member-list');
  let users = allUsers.slice().sort((a, b) => { const order = { super: 0, admin: 1, member: 2 }; return (order[a.role] || 2) - (order[b.role] || 2) || new Date(a.created_at) - new Date(b.created_at); });
  if (search) { const s = search.toLowerCase(); users = users.filter(u => u.name.toLowerCase().includes(s)); }
  if (!users.length) { list.innerHTML = '<div class="empty-state"><div class="icon">👥</div><p>暂无成员</p></div>'; return; }
  let html = '';
  users.forEach(u => {
    const c = getUserColor(u);
    const roleLabel = u.role === 'super' ? '超级管理员' : u.role === 'admin' ? '管理员' : '普通成员';
    const roleClass = u.role === 'super' ? 'role-super' : u.role === 'admin' ? 'role-admin' : 'role-member';
    const roleIcon = u.role === 'super' ? '<span class="role-icon">👑</span>' : u.role === 'admin' ? '<span class="role-icon">⭐</span>' : '';
    html += `<div class="member-card">
      <div class="avatar" style="background:${c}">${getInitial(u.name)}</div>
      <div class="info"><div class="name">${roleIcon} ${esc(u.name)}</div><span class="role-tag ${roleClass}">${roleLabel}</span></div>
      ${isSuperAdmin()?`<div class="vis-status vis-toggle"><div class="vis-dot" style="background:${u.visible?'var(--success)':'var(--error)'}"></div><span>${u.visible?'可见':'不可见'}</span>${u.id!==currentUser.id?`<div class="toggle${u.visible?' on':''}" onclick="toggleVisibility(${u.id},${u.visible})" style="margin-left:8px"></div>`:''}</div>`:''}
      <div class="actions">${isAdmin()&&u.id!==currentUser.id?`<button class="more-btn" onclick="event.stopPropagation();toggleMemberMenu(${u.id})">···</button>
        <div class="member-menu" id="member-menu-${u.id}">
          <button onclick="openResetPwd(${u.id},'${esc(u.name)}')">🔄 重置密码</button>
          ${isSuperAdmin()?`<div class="divider"></div>`:''}
          ${isSuperAdmin()&&u.role!=='admin'?`<button onclick="changeRole(${u.id},'admin')">⭐ 提升为管理员</button>`:''}
          ${isSuperAdmin()&&u.role==='admin'?`<button onclick="changeRole(${u.id},'member')">👤 降级为成员</button>`:''}
          ${isSuperAdmin()&&u.role==='admin'?`<button onclick="transferSuper(${u.id},'${esc(u.name)}')">⚡ 转移超管</button>`:''}
          <div class="divider"></div>
          <button class="danger" onclick="deleteMember(${u.id},'${esc(u.name)}')">🗑 删除成员</button>
        </div>`:''}
      </div></div>`;
  });
  list.innerHTML = html;
}

function toggleMemberMenu(uid) { closeAllDropdowns(); const menu = document.getElementById('member-menu-' + uid); if (menu) menu.classList.toggle('show'); }

async function toggleVisibility(uid, currentVal) {
  try {
    const user = allUsers.find(u => u.id === uid);
    if (!user) return;
    await updateUser(uid, { visible: !currentVal });
    allUsers = await fetchUsers();
    renderMembers(); renderCalendar();
    toast(`${user.name} 的日程已${!currentVal?'显示':'隐藏'}`, 'success');
  } catch (e) { toast('操作失败: ' + e.message, 'error'); }
}

function changeRole(uid, newRole) {
  const user = allUsers.find(u => u.id === uid);
  if (!user) return;
  const label = newRole === 'admin' ? '提升为管理员' : '降级为普通成员';
  showConfirm(`确认${label}？`, `确定将 ${user.name} ${label}？`, '确认', 'btn-primary', async () => {
    try { await updateUser(uid, { role: newRole }); allUsers = await fetchUsers(); renderMembers(); toast(`${user.name} 已${label}`, 'success'); } catch (e) { toast('操作失败: ' + e.message, 'error'); }
  });
}

function transferSuper(uid, name) {
  showConfirm('⚠️ 确认转移超级管理员？', `此操作将把超管身份转移给 <b>${name}</b>，您将变为管理员。`, '确认转移', 'btn-danger', async () => {
    const pwdEl = document.getElementById('transfer-pwd-input');
    const pwd = pwdEl ? pwdEl.value : '';
    if (pwd !== currentUser.password) return toast('密码错误，转移失败', 'error');
    try {
      await updateUser(currentUser.id, { role: 'admin' });
      await updateUser(uid, { role: 'super' });
      allUsers = await fetchUsers();
      currentUser = allUsers.find(u => u.id === currentUser.id);
      updateTeamVisibility();
      renderMembers();
      toast(`超管身份已转移给 ${name}`, 'success');
    } catch (e) { toast('转移失败: ' + e.message, 'error'); }
  }, `<div style="text-align:left;margin-top:12px"><label style="font-size:13px;color:var(--text2);margin-bottom:6px;display:block">请输入您的密码确认</label><input id="transfer-pwd-input" type="password" style="width:100%;height:40px;padding:0 12px;border:1.5px solid var(--border);border-radius:8px" placeholder="输入密码"></div>`);
}

function deleteMember(uid, name) {
  showConfirm('确认删除成员？', `确定删除成员 <b>${name}</b>？该成员的所有日程数据将被一并删除。`, '删除', 'btn-danger', async () => {
    try {
      await deleteUser(uid);
      allUsers = await fetchUsers();
      allEvents = await fetchEvents();
      renderMembers(); renderCalendar();
      toast(`已删除成员 ${name}`, 'success');
    } catch (e) { toast('删除失败: ' + e.message, 'error'); }
  });
}

function openResetPwd(uid, name) {
  resetPwdTargetId = uid;
  document.getElementById('reset-pwd-label').textContent = `为 ${name} 设置新密码`;
  document.getElementById('reset-pwd').value = '';
  document.getElementById('reset-pwd2').value = '';
  openModal('modal-reset-pwd');
}

async function doResetPassword() {
  const pwd = document.getElementById('reset-pwd').value;
  const pwd2 = document.getElementById('reset-pwd2').value;
  if (pwd.length < 6) return toast('密码至少6位', 'error');
  if (pwd !== pwd2) return toast('两次密码不一致', 'error');
  try {
    await updateUser(resetPwdTargetId, { password: pwd });
    allUsers = await fetchUsers();
    closeModal('modal-reset-pwd');
    const user = allUsers.find(u => u.id === resetPwdTargetId);
    toast(`已重置 ${user ? user.name : ''} 的密码`, 'success');
  } catch (e) { toast('重置失败: ' + e.message, 'error'); }
}

// ===== KEYBOARD SHORTCUTS =====
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (document.querySelector('.modal-overlay.show,.confirm-overlay.show,.lightbox.show')) return;
  if (!currentUser) return;
  if (e.key === 'n' || e.key === 'N') { e.preventDefault(); openCreateEvent(); }
  if (e.key === 't' || e.key === 'T') { e.preventDefault(); goToday(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); changeWeek(-1); }
  if (e.key === 'ArrowRight') { e.preventDefault(); changeWeek(1); }
  if (e.key === 'Escape') closeLightbox();
});

let resizeTimer;
window.addEventListener('resize', () => { clearTimeout(resizeTimer); resizeTimer = setTimeout(() => { if (currentUser && document.getElementById('page-calendar').classList.contains('active')) renderCalendar(); }, 200); });

// ===== INIT =====
(async () => {
  try {
    const users = await fetchUsers();
    if (users.length === 0) { document.getElementById('loading-overlay').style.display = 'none'; showPage('setup'); return; }
    const hasSession = await checkSession();
    if (hasSession) { await loadApp(); showPage('calendar'); }
    else { showPage('login'); }
  } catch (e) { toast('连接失败: ' + e.message, 'error'); showPage('login'); }
  document.getElementById('loading-overlay').style.display = 'none';
})();

setInterval(() => { if (currentUser && document.getElementById('page-calendar').classList.contains('active')) renderCalendar(); }, 60000);
</script>
